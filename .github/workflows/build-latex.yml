name: Build LaTeX Document

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_latex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v3

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: thesis.tex

      - name: Prepare PDF build directory
        run: |
          mkdir -p build
          mv thesis.pdf build/

      - name: Push to pdf branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: pdf
          force_orphan: true
          commit_message: "Auto-compile LaTeX document [skip ci]"
